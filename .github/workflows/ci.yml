name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_embed_tests:
        description: 'Run full test suite including embedding/semantic search tests'
        required: false
        default: false
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint

      - name: Validate package exports
        run: npx publint

      - name: Validate TypeScript types
        run: npx attw --pack .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run tests (default - no embeddings)
        if: ${{ !inputs.include_embed_tests }}
        run: pnpm test

      - name: Run full tests (with embeddings)
        if: ${{ inputs.include_embed_tests }}
        env:
          INCLUDE_EMBED_TESTS: true
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm test

      - name: Test CLI execution
        run: node dist/cli/main.js --help
