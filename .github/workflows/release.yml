name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.3.4'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.HELIOY_PAT }}

  publish:
    needs: release-please
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name || github.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        # Bundled npm in Node 22.22.2 has a broken dependency tree (missing
        # promise-retry in arborist), so `npm install -g npm@latest` crashes.
        # Install via pnpm instead; $PNPM_HOME is first on PATH so the fresh
        # npm shadows the broken bundled one.
        run: pnpm add -g npm@latest

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify recovery tag matches package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "v${version}" != "${{ inputs.tag }}" ]; then
            echo "Package version ${version} does not match tag ${{ inputs.tag }}"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ''
